notes: >
  THE THESIS ENTRY. NOAA announced in 2025 it would stop updating this
  database. Historical data through 2024 remains reachable but is no longer
  maintained — hence status=frozen. This is exactly the kind of small,
  high-value, at-risk artifact that should be prioritized for an actual mirror
  (it is a single modest CSV). Verify current reachability before relying on it;
  if the page 404s, flip status to dark and populate archive.wayback_url +
  archive.mirror.
